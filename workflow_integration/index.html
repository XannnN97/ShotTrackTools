<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ShotTrackTools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 30px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
        }
        .version {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        .description {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-launch {
            background: #0078D4;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }
        .btn-launch:hover {
            background: #005a9e;
        }
        .btn-launch:active {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>ShotTrackTools</h1>
        <div class="version">v1.1.0</div>
        <div class="description">
            Batch shot naming, sequential numbering,<br>
            PNG placeholder generation & suffix cleanup<br>
            for DaVinci Resolve timeline workflows.
        </div>
        <button class="btn-launch" id="launchBtn">Launch ShotTrackTools</button>
        <div class="footer">BaseFX VFX Pipeline Tools</div>
    </div>

    <script>
        document.getElementById('launchBtn').addEventListener('click', () => {
            window.shottracktools.launchPython();
            document.getElementById('launchBtn').textContent = 'Launching...';
            document.getElementById('launchBtn').disabled = true;
            setTimeout(() => {
                document.getElementById('launchBtn').textContent = 'Launch ShotTrackTools';
                document.getElementById('launchBtn').disabled = false;
            }, 3000);
        });
    </script>
</body>
</html>
